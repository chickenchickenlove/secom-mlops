events { }

http {
  include /etc/nginx/runtime/model-production-upstream.conf;

  upstream model_release_backend {
    server model-server-release:28091;
  }

  upstream model_canary_backend {
    server model-server-canary:28092;
  }

  upstream model_shadow_backend {
    server model-server-shadow:28093;
  }

  server {
    listen 8080;

    location = /health {
      proxy_pass http://model_production_backend/health;
    }

    location = /metadata {
      proxy_pass http://model_production_backend/metadata;
    }

    location = /invocations {
      proxy_pass http://model_production_backend/invocations;
      proxy_set_header Host $host;
      proxy_set_header X-Request-ID $request_id;
    }

    location = /release/health {
      proxy_pass http://model_release_backend/health;
    }

    location = /release/metadata {
      proxy_pass http://model_release_backend/metadata;
    }

    location = /release/invocations {
      proxy_pass http://model_release_backend/invocations;
      proxy_set_header Host $host;
      proxy_set_header X-Request-ID $request_id;
    }

    location = /release/admin/reload-model-version {
      proxy_pass http://model_release_backend/admin/reload-model-version;
    }

    location = /release/admin/reload-threshold {
      proxy_pass http://model_release_backend/admin/reload-threshold;
    }

    location = /canary/health {
      proxy_pass http://model_canary_backend/health;
    }

    location = /canary/metadata {
      proxy_pass http://model_canary_backend/metadata;
    }

    location = /canary/invocations {
      proxy_pass http://model_canary_backend/invocations;
      proxy_set_header Host $host;
      proxy_set_header X-Request-ID $request_id;
    }

    location = /canary/admin/reload-model-version {
      proxy_pass http://model_canary_backend/admin/reload-model-version;
    }

    location = /canary/admin/reload-threshold {
      proxy_pass http://model_canary_backend/admin/reload-threshold;
    }

    location = /shadow/health {
      proxy_pass http://model_shadow_backend/health;
    }

    location = /shadow/metadata {
      proxy_pass http://model_shadow_backend/metadata;
    }

    location = /shadow/invocations {
      proxy_pass http://model_shadow_backend/invocations;
      proxy_set_header Host $host;
      proxy_set_header X-Request-ID $request_id;
    }

    location = /shadow/admin/reload-model-version {
      proxy_pass http://model_shadow_backend/admin/reload-model-version;
    }

    location = /shadow/admin/reload-threshold {
      proxy_pass http://model_shadow_backend/admin/reload-threshold;
    }
  }
}
