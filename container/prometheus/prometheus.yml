global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: kafka
    static_configs:
      - targets:
          - kafka:7071

  - job_name: kafka-exporter
    static_configs:
      - targets:
          - kafka-exporter:9308

  - job_name: predictor
    metrics_path: /metrics
    static_configs:
      - targets:
          - predictor-release:8080
        labels:
          predictor_slot: release
      - targets:
          - predictor-canary:8080
        labels:
          predictor_slot: canary
